<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TKR Admin Panel – Registrations</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c518;
    --bg: #07080f;
    --card: #0e1120;
    --border: #1e2340;
    --accent: #4f8ef7;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e8eaf6;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(79,142,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(124,58,237,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* LOGIN */
  .login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    z-index: 1;
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .login-icon { font-size: 48px; margin-bottom: 16px; }
  .login-box h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .login-box p { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .login-box input {
    width: 100%;
    background: #111525;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 12px 14px;
    outline: none;
    margin-bottom: 14px;
    text-align: center;
    letter-spacing: 4px;
  }
  .login-box input:focus { border-color: var(--gold); }
  .login-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #f5c518, #ffaa00);
    color: #07080f;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
  }
  .login-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

  /* MAIN ADMIN */
  .admin-wrap { display: none; position: relative; z-index: 1; }
  .admin-wrap.show { display: block; }

  /* TOP BAR */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 2px;
  }
  .topbar-left p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .topbar-right { display: flex; gap: 10px; align-items: center; }
  .logout-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 20px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .stat-total .stat-num { color: var(--accent); }
  .stat-pending .stat-num { color: var(--yellow); }
  .stat-approved .stat-num { color: var(--green); }
  .stat-rejected .stat-num { color: var(--red); }

  /* FILTERS */
  .filters {
    padding: 0 20px 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .filter-btn.active-all { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.1); }
  .filter-btn.active-pending { border-color: var(--yellow); color: var(--yellow); background: rgba(245,158,11,0.1); }
  .filter-btn.active-approved { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.1); }
  .filter-btn.active-rejected { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.1); }
  .refresh-btn {
    margin-left: auto;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--gold);
    background: rgba(245,197,24,0.08);
    color: var(--gold);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
  }

  /* CARDS LIST */
  .cards-list { padding: 0 20px 40px; display: flex; flex-direction: column; gap: 14px; }

  .reg-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .reg-card.status-pending { border-left: 3px solid var(--yellow); }
  .reg-card.status-approved { border-left: 3px solid var(--green); }
  .reg-card.status-rejected { border-left: 3px solid var(--red); }

  .reg-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 10px;
  }
  .reg-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .reg-event {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    margin-top: 2px;
  }
  .status-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-pending { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
  .badge-approved { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .badge-rejected { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

  .reg-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
    margin-bottom: 14px;
  }
  .reg-detail-item { font-size: 13px; color: var(--muted); }
  .reg-detail-item span { color: var(--text); font-weight: 600; }

  .reg-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .action-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-approve {
    background: rgba(34,197,94,0.15);
    color: var(--green);
    border: 1px solid rgba(34,197,94,0.4);
  }
  .btn-approve:hover { background: rgba(34,197,94,0.3); }
  .btn-reject {
    background: rgba(239,68,68,0.12);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
  }
  .btn-reject:hover { background: rgba(239,68,68,0.25); }
  .btn-share {
    background: rgba(79,142,247,0.12);
    color: var(--accent);
    border: 1px solid rgba(79,142,247,0.3);
    margin-left: auto;
  }
  .btn-share:hover { background: rgba(79,142,247,0.25); }
  .btn-share:disabled { opacity: 0.4; cursor: not-allowed; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 50px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 15px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SHARE MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    position: relative;
  }
  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
  }
  .modal h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    color: var(--green);
    letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .share-card {
    background: #111525;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 18px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    border: 1px solid var(--border);
  }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .modal-copy { background: linear-gradient(135deg,#22c55e,#16a34a); color: #fff; }
  .modal-whatsapp { background: #25D366; color: #fff; }
  .modal-close { background: #111525; color: var(--muted); border: 1px solid var(--border); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #fff;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    z-index: 300;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .reg-details { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h2>ADMIN PANEL</h2>
    <p>TKR Tech Fest 241 — Enter admin password to continue</p>
    <input type="password" id="adminPass" placeholder="Password" onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">LOGIN →</button>
    <div class="login-error" id="loginError">❌ Incorrect password</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-wrap" id="adminWrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <h1>⚡ TKR ADMIN</h1>
      <p>Registration Management</p>
    </div>
    <div class="topbar-right">
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card stat-total">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card stat-pending">
      <div class="stat-num" id="statPending">0</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card stat-approved">
      <div class="stat-num" id="statApproved">0</div>
      <div class="stat-label">Approved</div>
    </div>
    <div class="stat-card stat-rejected">
      <div class="stat-num" id="statRejected">0</div>
      <div class="stat-label">Rejected</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active-all" id="f-all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" id="f-pending" onclick="setFilter('pending')">⏳ Pending</button>
    <button class="filter-btn" id="f-approved" onclick="setFilter('approved')">✅ Approved</button>
    <button class="filter-btn" id="f-rejected" onclick="setFilter('rejected')">❌ Rejected</button>
    <button class="refresh-btn" onclick="loadRegistrations()">🔄 Refresh</button>
  </div>

  <!-- CARDS -->
  <div class="cards-list" id="cardsList">
    <div class="loading">
      <div class="spinner"></div>
      Loading registrations...
    </div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="modal-overlay" id="shareModal">
  <div class="modal">
    <h3>✅ SHARE APPROVAL</h3>
    <div class="share-card" id="shareText"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-copy" onclick="copyShare()">📋 Copy</button>
      <button class="modal-btn modal-whatsapp" onclick="whatsappShare()">💬 WhatsApp</button>
      <button class="modal-btn modal-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ===== CONFIG =====
  const ADMIN_PASSWORD = "tkr@241"; // 🔁 Change this to your password
  const SHEET_API = "https://api.sheetbest.com/sheets/21f1d98b-9daa-4621-b8a9-3616679c715c";

  let allData = [];
  let currentFilter = "all";
  let sharePayload = "";

  // ===== LOGIN =====
  function doLogin() {
    const pass = document.getElementById("adminPass").value;
    if (pass === ADMIN_PASSWORD) {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("adminWrap").className = "admin-wrap show";
      loadRegistrations();
    } else {
      document.getElementById("loginError").style.display = "block";
    }
  }

  function doLogout() {
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("adminWrap").className = "admin-wrap";
    document.getElementById("adminPass").value = "";
  }

  // ===== LOAD DATA =====
  async function loadRegistrations() {
    document.getElementById("cardsList").innerHTML = `
      <div class="loading"><div class="spinner"></div>Loading registrations...</div>`;
    try {
      const res = await fetch(SHEET_API);
      const data = await res.json();
      // Filter out header rows / empty
      allData = data.filter(r => r["Full Name"] && r["Full Name"] !== "Full Name");
      // Add status if missing
      allData = allData.map(r => ({ ...r, Status: r["Status"] || "pending" }));
      updateStats();
      renderCards();
    } catch (e) {
      document.getElementById("cardsList").innerHTML = `
        <div class="empty-state"><div class="icon">⚠️</div><p>Failed to load. Check internet connection.</p></div>`;
    }
  }

  // ===== STATS =====
  function updateStats() {
    const total = allData.length;
    const pending = allData.filter(r => (r.Status || "pending") === "pending").length;
    const approved = allData.filter(r => r.Status === "approved").length;
    const rejected = allData.filter(r => r.Status === "rejected").length;
    document.getElementById("statTotal").textContent = total;
    document.getElementById("statPending").textContent = pending;
    document.getElementById("statApproved").textContent = approved;
    document.getElementById("statRejected").textContent = rejected;
  }

  // ===== FILTER =====
  function setFilter(f) {
    currentFilter = f;
    ["all","pending","approved","rejected"].forEach(x => {
      const btn = document.getElementById(`f-${x}`);
      btn.className = "filter-btn" + (x === f ? ` active-${x}` : "");
    });
    renderCards();
  }

  // ===== RENDER =====
  function renderCards() {
    const filtered = currentFilter === "all"
      ? allData
      : allData.filter(r => (r.Status || "pending") === currentFilter);

    if (filtered.length === 0) {
      document.getElementById("cardsList").innerHTML = `
        <div class="empty-state"><div class="icon">📭</div><p>No registrations found.</p></div>`;
      return;
    }

    const html = filtered.map((r, i) => {
      const globalIdx = allData.indexOf(r);
      const status = r.Status || "pending";
      const badgeClass = `badge-${status}`;
      const cardClass = `status-${status}`;
      const statusLabel = status === "pending" ? "⏳ Pending" : status === "approved" ? "✅ Approved" : "❌ Rejected";

      return `
        <div class="reg-card ${cardClass}" id="card-${globalIdx}">
          <div class="reg-card-top">
            <div>
              <div class="reg-name">${r["Full Name"] || "—"}</div>
              <div class="reg-event">🎯 ${r["Event Name"] || "—"} • ${r["Category"] || "—"}</div>
            </div>
            <div class="status-badge ${badgeClass}">${statusLabel}</div>
          </div>
          <div class="reg-details">
            <div class="reg-detail-item">📱 Phone: <span>${r["Phone Number"] || "—"}</span></div>
            <div class="reg-detail-item">📧 Email: <span>${r["Email"] || "—"}</span></div>
            <div class="reg-detail-item">🎓 Year/Branch: <span>${r["Year & Branch"] || "—"}</span></div>
            <div class="reg-detail-item">💻 Mode: <span>${r["Mode"] || "—"}</span></div>
            <div class="reg-detail-item">💰 Amount: <span style="color:var(--green)">${r["Amount Paid"] || "—"}</span></div>
            <div class="reg-detail-item">🔑 Txn ID: <span>${r["Transaction ID"] || "—"}</span></div>
          </div>
          <div class="reg-actions">
            ${status !== "approved" ? `<button class="action-btn btn-approve" onclick="updateStatus(${globalIdx}, 'approved')">✅ Approve</button>` : ""}
            ${status !== "rejected" ? `<button class="action-btn btn-reject" onclick="updateStatus(${globalIdx}, 'rejected')">❌ Reject</button>` : ""}
            <button class="action-btn btn-share" onclick="openShare(${globalIdx})" ${status !== "approved" ? "disabled title='Approve first to share'" : ""}>
              📤 Share
            </button>
          </div>
        </div>`;
    }).join("");

    document.getElementById("cardsList").innerHTML = html;
  }

  // ===== UPDATE STATUS =====
  async function updateStatus(idx, newStatus) {
    allData[idx].Status = newStatus;

    // Update in SheetBest by row
    try {
      const rowNum = idx + 2; // SheetBest rows start from 2 (1 is header)
      await fetch(`${SHEET_API}/${idx}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ "Status": newStatus })
      });
    } catch(e) {
      console.error("Status update error:", e);
    }

    updateStats();
    renderCards();
    showToast(newStatus === "approved" ? "✅ Registration Approved!" : "❌ Registration Rejected");
  }

  // ===== SHARE =====
  function openShare(idx) {
    const r = allData[idx];
    const text =
`🎉 *TKR TECH FEST 241*
✅ *Registration Approved!*

👤 Name: ${r["Full Name"]}
📱 Phone: ${r["Phone Number"]}
🎓 Year/Branch: ${r["Year & Branch"]}
🎯 Event: ${r["Event Name"]}
📂 Category: ${r["Category"]}
💻 Mode: ${r["Mode"]}
💰 Amount Paid: ${r["Amount Paid"]}

🏫 TKR College of Engineering & Technology
See you at the event! 🚀`;

    sharePayload = text;
    document.getElementById("shareText").textContent = text;
    document.getElementById("shareModal").className = "modal-overlay show";
  }

  function closeModal() {
    document.getElementById("shareModal").className = "modal-overlay";
  }

  function copyShare() {
    navigator.clipboard.writeText(sharePayload).then(() => {
      showToast("📋 Copied to clipboard!");
      closeModal();
    });
  }

  function whatsappShare() {
    const encoded = encodeURIComponent(sharePayload);
    window.open(`https://wa.me/?text=${encoded}`, "_blank");
    closeModal();
  }

  // ===== TOAST =====
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show";
    setTimeout(() => { t.className = "toast"; }, 2500);
  }
</script>
</body>
</html>
